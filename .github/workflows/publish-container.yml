# Reusable workflow: build and push a container image to GHCR.
# Callers pin to the floating v1 branch:
#   uses: Roxabi/.github/.github/workflows/publish-container.yml@v1
#
# release_please_component is accepted for caller convention parity and future
# extensibility (e.g. composing the default image_name). It is not consumed
# in the workflow body in this initial version.

on:
  workflow_call:
    inputs:
      image_name:
        description: "Full registry path, e.g. ghcr.io/roxabi/lyra"
        required: true
        type: string
      release_please_component:
        description: "Reserved — currently unused by this workflow; accepted for caller convention parity."
        required: false
        default: ""
        type: string
      dockerfile_path:
        description: "Path to the Dockerfile"
        required: false
        type: string
        default: "./Dockerfile"
      build_context:
        description: "Docker build context path"
        required: false
        type: string
        default: "."

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f  # v3.9.0

      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9  # v3.7.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract semver from tag
        id: strip
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          # github.ref_name is e.g. "lyra/v0.3.0"; strip "<component>/v" → "0.3.0"
          full="${{ github.ref_name }}"
          version="${full#*/v}"
          major="${version%%.*}"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "major=${major}" >> "$GITHUB_OUTPUT"

      - name: Metadata (staging branch)
        id: meta-staging
        if: github.ref == 'refs/heads/staging'
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051  # v5.9.0
        with:
          images: ${{ inputs.image_name }}
          tags: |
            type=raw,value=staging
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ github.ref_name }}

      - name: Build and push (staging branch)
        if: github.ref == 'refs/heads/staging'
        uses: docker/build-push-action@ca052bb54ab0790a636c9b5f226502c73d547a25  # v5.4.0
        with:
          context: ${{ inputs.build_context }}
          file: ${{ inputs.dockerfile_path }}
          push: true
          tags: ${{ steps.meta-staging.outputs.tags }}
          labels: ${{ steps.meta-staging.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Metadata (release tag)
        id: meta-tag
        if: startsWith(github.ref, 'refs/tags/')
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051  # v5.9.0
        with:
          images: ${{ inputs.image_name }}
          tags: |
            type=raw,value=${{ steps.strip.outputs.version }}
            type=raw,value=${{ steps.strip.outputs.major }}
            type=raw,value=latest
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ github.ref_name }}

      - name: Build and push (release tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: docker/build-push-action@ca052bb54ab0790a636c9b5f226502c73d547a25  # v5.4.0
        with:
          context: ${{ inputs.build_context }}
          file: ${{ inputs.dockerfile_path }}
          push: true
          tags: ${{ steps.meta-tag.outputs.tags }}
          labels: ${{ steps.meta-tag.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
